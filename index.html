<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>მარიამ გილოცავთ! 🌸</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0a0e;font-family:'Inter',sans-serif;overflow:hidden;height:100vh}
#map{width:100vw;height:100vh}
#intro{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 40% 60%,#1e0a1e,#0a0a14 60%,#0e0a0e);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;transition:opacity 1.4s,transform 1.4s;
}
#intro.out{opacity:0;transform:scale(1.05);pointer-events:none}
.petal{position:absolute;font-size:18px;opacity:0;pointer-events:none;animation:pfall linear infinite}
@keyframes pfall{0%{opacity:0;transform:translateY(-30px) rotate(0)}10%{opacity:.7}90%{opacity:.4}100%{opacity:0;transform:translateY(105vh) rotate(600deg)}}
.i-tag{font-size:11px;letter-spacing:5px;color:#d4a8e0;text-transform:uppercase;margin-bottom:16px;animation:up .8s .2s both}
.i-name{font-family:'Playfair Display',serif;font-size:clamp(52px,12vw,96px);font-style:italic;color:#fff;line-height:1;animation:up .8s .5s both;text-align:center}
.i-name span{color:#e879a0}
.i-sub{font-size:14px;color:#7a6080;margin-top:20px;text-align:center;line-height:1.7;animation:up .8s .8s both;max-width:320px;font-style:italic}
.i-btn{margin-top:44px;border:1px solid #e879a0;background:transparent;color:#fff;font-family:'Inter',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:14px 44px;cursor:pointer;transition:all .3s;animation:up .8s 1.1s both}
.i-btn:hover{background:#e879a0;color:#0e0a0e}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#hud{position:fixed;top:0;left:0;right:0;z-index:1000;background:linear-gradient(to bottom,rgba(14,10,14,.92),transparent);padding:14px 22px;display:none;align-items:center;justify-content:space-between;pointer-events:none}
.hud-l{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:#f0e0f5; margin-left:52px}
.hud-r{display:flex;gap:18px}
.hud-stat span{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a3a50}
.hud-stat strong{font-size:13px;color:#e879a0;font-weight:400}
#prog{position:fixed;bottom:0;left:0;right:0;height:3px;z-index:1001;background:#1a101a}
#progf{height:100%;width:0%;background:linear-gradient(to right,#9b27af,#e879a0,#f9a8d4);transition:width .5s;box-shadow:0 0 10px #e879a088}
#done{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);z-index:1002;background:rgba(14,10,14,.96);border:1px solid rgba(232,121,160,.35);border-radius:18px;padding:20px 32px;text-align:center;backdrop-filter:blur(14px);transition:transform .7s cubic-bezier(.34,1.56,.64,1),opacity .7s;opacity:0;max-width:420px;width:90%}
#done.show{transform:translateX(-50%) translateY(0);opacity:1}
.dc-title{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:#fff;line-height:1.5;margin-bottom:6px}
.dc-sub{font-size:11px;color:#4a3a50;letter-spacing:2px;text-transform:uppercase}
.mk{display:flex;flex-direction:column;align-items:center;cursor:pointer;filter:drop-shadow(0 3px 8px rgba(0,0,0,.6));animation:mkpop .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes mkpop{from{opacity:0;transform:scale(0) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mk:hover .mkc{transform:scale(1.2) translateY(-2px)}
.mkc{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid rgba(255,255,255,.2);transition:transform .2s;position:relative}
.mkc::after{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent}
.mklb{font-size:10px;letter-spacing:.5px;background:rgba(14,10,14,.85);color:#f0e0f5;padding:2px 7px;border-radius:12px;margin-top:4px;white-space:nowrap;border:1px solid rgba(232,121,160,.25)}
.mkc.pink{background:rgba(220,80,130,.85)} .mkc.pink::after{border-top:9px solid rgba(220,80,130,.85)}
.mkc.violet{background:rgba(150,60,200,.85)} .mkc.violet::after{border-top:9px solid rgba(150,60,200,.85)}
.mkc.gold{background:rgba(200,155,40,.85)} .mkc.gold::after{border-top:9px solid rgba(200,155,40,.85)}
.mkc.teal{background:rgba(30,160,150,.85)} .mkc.teal::after{border-top:9px solid rgba(30,160,150,.85)}
.mkc.rose{background:rgba(200,60,80,.85)} .mkc.rose::after{border-top:9px solid rgba(200,60,80,.85)}
.leaflet-popup-content-wrapper{background:rgba(18,10,20,.97)!important;border:1px solid rgba(232,121,160,.3)!important;border-radius:16px!important;padding:0!important;box-shadow:0 20px 50px rgba(0,0,0,.7)!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip{background:rgba(18,10,20,.97)!important}
.leaflet-popup-close-button{color:#6a4a70!important;font-size:18px!important;top:10px!important;right:12px!important}
.leaflet-popup-close-button:hover{color:#f0e0f5!important}
.pop{padding:22px 20px 18px}
.pop-em{font-size:30px;margin-bottom:8px;display:block}
.pop-title{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:#f0e0f5;margin-bottom:5px}
.pop-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#e879a0;margin-bottom:10px;display:block}
.pop-txt{font-size:13px;line-height:1.75;color:#8a6890;font-style:italic}
.pop-line{width:36px;height:1px;background:linear-gradient(to right,transparent,#e879a0,transparent);margin:12px auto 0}
.flwr-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,180,200,.4);box-shadow:0 0 5px rgba(232,121,160,.4)}
.leaflet-control-zoom a{background:rgba(14,10,14,.9)!important;color:#f0e0f5!important;border-color:rgba(232,121,160,.2)!important}
.leaflet-control-zoom a:hover{background:rgba(232,121,160,.2)!important}
.leaflet-control-attribution{background:rgba(14,10,14,.7)!important;color:#333!important;font-size:10px!important}
.leaflet-control-attribution a{color:#555!important}
.cc{position:fixed;pointer-events:none;z-index:9998;border-radius:2px;animation:ccf linear forwards}
@keyframes ccf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>

   title:"სადაც ყველაფერი დაიწყო",tag:"თბილისის სახელმწიფო უნივერსიტეტი",

  {lat:41.7122478236869,lng:44.7812251118539,color:"pink",emoji:"🌷",label:"ყვავილები",
   title:"გზად ყვავილები",tag:"ყვავილების ბულვარი",

  {lat:41.71582984454,lng:44.7788244765165,color:"gold",emoji:"📚",label:"წიგნები",

const PETAL_BG = [
  "#f48fb1","#f06292","#ce93d8","#ef9a9a","#f8bbd9","#e879a0","#ba68c8","#ff80ab"
];

let map;

function initMap() {
  map = L.map('map', {center:[41.7099773,44.7791672], zoom:20, zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; <a href="https://carto.com">CARTO</a>',
    maxZoom:20, subdomains:'abcd'
  }).addTo(map);
}

function drawRoute() {
  L.polyline(ROUTE,{color:'#e879a0',weight:20,opacity:.1,lineCap:'round'}).addTo(map);
  const pl = L.polyline(ROUTE,{color:'#e879a0',weight:4,opacity:1,lineCap:'round',lineJoin:'round',dashArray:'8 6'}).addTo(map);
  const el = pl.getElement();
  if (el && el.getTotalLength) {
    const len = el.getTotalLength();
    el.style.strokeDasharray = len+' '+len;
    el.style.strokeDashoffset = len;
    el.style.transition = 'stroke-dashoffset 4s linear';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.strokeDashoffset='0'; }));
  }
}

function drawFlower() {
  FLOWER_PTS.forEach((pt,i) => {
    const icon = L.divIcon({
      className:'',
      html:'<div class="flwr-dot" style="background:'+PETAL_BG[i%PETAL_BG.length]+'"></div>',
      iconSize:[9,9], iconAnchor:[4,4]
    });
    L.marker(pt,{icon,zIndexOffset:-100}).addTo(map);
  });
}

function placeMarkers() {
  MARKERS.forEach((m,i) => {
    const icon = L.divIcon({
      className:'',
      iconAnchor:[22,53], popupAnchor:[0,-55],
      html:'<div class="mk" style="animation-delay:'+i*.18+'s">'+
           '<div class="mkc '+m.color+'">'+m.emoji+'</div>'+
           '<div class="mklb">'+m.label+'</div></div>'
    });
    const mk = L.marker([m.lat,m.lng],{icon}).addTo(map);
    mk.bindPopup(
      '<div class="pop"><span class="pop-em">'+m.emoji+'</span>'+
      '<div class="pop-title">'+m.title+'</div>'+
      '<span class="pop-tag">'+m.tag+'</span>'+
      '<div class="pop-txt">'+m.txt+'</div>'+
      '<div class="pop-line"></div></div>',
      {maxWidth:270}
    );
    if (i===4) mk.on('click',()=>setTimeout(celebrate,300));
  });
}

function animProgress() {
  let p=0;
  const iv = setInterval(()=>{
    p = Math.min(p+1.2,100);
    document.getElementById('progf').style.width = p+'%';
    if (p>=100) {
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('done').classList.add('show');
        celebrate();
      },400);
    }
  },80);
}

function celebrate() {
  const cols=['#e879a0','#f48fb1','#ce93d8','#f9a8d4','#fff','#ffb74d','#80cbc4'];
  for (let i=0;i<80;i++) {
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='cc';
      const sz=4+Math.random()*7;
      el.style.cssText='left:'+Math.random()*100+'vw;top:-10px;width:'+sz+'px;height:'+sz+'px;'+
        'background:'+cols[Math.floor(Math.random()*cols.length)]+';'+
        'border-radius:'+(Math.random()>.5?'50%':'2px')+';'+
        'animation-duration:'+(2.5+Math.random()*2)+'s;'+
        'animation-delay:'+(Math.random()*.3)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },i*30);
  }
}

function openMap() {
  document.getElementById('intro').classList.add('out');
  setTimeout(()=>{
    document.getElementById('intro').style.display='none';
    document.getElementById('hud').style.display='flex';
    const bounds = L.latLngBounds([...ROUTE, ...FLOWER_PTS.slice(0,30)]);
    map.fitBounds(bounds,{padding:[70,70],maxZoom:16});
    setTimeout(()=>{
      drawRoute();
      setTimeout(()=>{
        drawFlower();
        placeMarkers();
        animProgress();
      },700);
    },700);
  },1400);
}

// Petals on intro
(function(){
  const intro=document.getElementById('intro');
  const emojis=['🌸','🌺','🌹','🌷','✨','💫','🌼','💕'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div'); p.className='petal';
    p.textContent=emojis[i%emojis.length];
    p.style.cssText='left:'+Math.random()*100+'vw;font-size:'+(14+Math.random()*16)+'px;'+
      'animation-duration:'+(4+Math.random()*7)+'s;animation-delay:'+(Math.random()*5)+'s';
    intro.appendChild(p);
  }
})();

// Init everything after page is fully loaded
window.addEventListener('load', function() {
  initMap();
  document.getElementById('startBtn').addEventListener('click', openMap);
});
</script>
